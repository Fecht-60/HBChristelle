<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bien joué !</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #cfe0f0 0%, #dce8f5 50%, #d6e4f0 100%);
      min-height: 100vh;
      color: #3a3a5c;
      padding: 40px 20px 60px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      overflow-x: hidden;
    }

    body.visible { opacity: 1; }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .badge {
      font-size: 4rem;
      display: inline-block;
      margin-bottom: 6px;
      animation: pop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .badge-sub {
      font-size: 2rem;
      display: inline-block;
      animation: pop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
      margin-left: -8px;
    }

    @keyframes pop {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    h1 {
      font-size: 2.2rem;
      color: #b07d3a;
      margin: 14px 0 8px;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .tagline {
      font-size: 1rem;
      color: #7a8aaa;
      margin-bottom: 28px;
      animation: fadeUp 0.7s ease 0.4s both;
    }

    .message {
      max-width: 540px;
      margin: 0 auto 36px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: #5a6a8a;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 28px 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(100,130,180,0.12);
      animation: fadeUp 0.7s ease 0.5s both;
    }

    .message strong { color: #b07d3a; }

    .photos-section {
      animation: fadeUp 0.7s ease 0.7s both;
    }

    .photos-label {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9aaac0;
      margin-bottom: 16px;
    }

    .photos {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .photo-wrap {
      position: relative;
      width: calc(50% - 10px);
      max-width: 210px;
    }

    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      background: linear-gradient(135deg, #e8c97a, #a8c8e8, #c8a8d8);
      z-index: 0;
      opacity: 0.7;
      animation: shimmer 3s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0.9; transform: scale(1.01); }
    }

    .photo-wrap img {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 12px 36px rgba(100,130,180,0.2);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .photo-wrap:hover img { transform: scale(1.04) rotate(-1deg); }

    .sticker {
      position: absolute;
      font-size: 1.6rem;
      z-index: 2;
      animation: wobble 2s ease-in-out infinite;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .sticker-1 { top: -14px; right: -10px; animation-delay: 0s; }
    .sticker-2 { bottom: -12px; left: -10px; animation-delay: 0.6s; }
    .sticker-3 { top: -14px; left: -10px; animation-delay: 0.3s; }
    .sticker-4 { bottom: -12px; right: -10px; animation-delay: 0.9s; }

    @keyframes wobble {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50%       { transform: rotate(8deg) scale(1.15); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 440px) {
      h1 { font-size: 1.7rem; }
      .message { padding: 20px; font-size: 0.95rem; }
      .photos { gap: 12px; }
      .sticker { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="content">
    <div>
      <span class="badge">⭐</span>
      <span class="badge-sub">⭐</span>
    </div>
    <h1>Bien joué !</h1>
    <p class="tagline"> Tu as trouvé le résultat du mot fléché…</p>

    <div class="message">
       <br/><br/>
      <strong>En regroupant les deux énigmes, est-ce qu'une petite idée se profile ?</strong><br/><br/>
      Si non, un peu de patience — on vous dévoile tout ça <strong>début juillet !</strong> 🗓️
    </div>

    <div class="photos-section">
      <p class="photos-label">🐾</p>
      <div class="photos">

        <div class="photo-wrap">
          <span class="sticker sticker-1">⭐</span>
          <span class="sticker sticker-2">✨</span>
          <img src="photo1.jpg" alt="Nawak"/>
        </div>

        <div class="photo-wrap">
          <span class="sticker sticker-3">⭐</span>
          <span class="sticker sticker-4">✨</span>
          <img src="photo2.jpg" alt="Tartine"/>
        </div>

      </div>
    </div>
  </div>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    (async () => {
      const token = sessionStorage.getItem('access_token');
      const storedHash = sessionStorage.getItem('token_hash');
      if (!token || !storedHash || await sha256(token) !== storedHash) {
        window.location.replace('index.html');
        return;
      }
      sessionStorage.removeItem('access_token');
      sessionStorage.removeItem('token_hash');
      document.body.classList.add('visible');
    })();

    /* ── Paillettes ── */
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#e8c97a','#a8c8e8','#c8a8d8','#a8d8c0','#f0c8c8','#f8e4a0','#b8d8f0'];
    const SHAPES = ['circle','square','star','triangle'];

    const particles = Array.from({ length: 120 }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight - innerHeight,
      size: Math.random() * 8 + 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
      speed: Math.random() * 1.8 + 0.6,
      spin: (Math.random() - 0.5) * 0.12,
      angle: Math.random() * Math.PI * 2,
      drift: (Math.random() - 0.5) * 1.2,
      opacity: Math.random() * 0.5 + 0.5,
    }));

    let t = 0;
    function drawStar(ctx, x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
        ctx[i === 0 ? 'moveTo' : 'lineTo'](x + r * Math.cos(a), y + r * Math.sin(a));
        ctx.lineTo(x + (r * 0.4) * Math.cos(b), y + (r * 0.4) * Math.sin(b));
      }
      ctx.closePath();
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      t += 0.008;
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === 'square') {
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        } else if (p.shape === 'star') {
          drawStar(ctx, 0, 0, p.size);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(0, -p.size);
          ctx.lineTo(p.size, p.size);
          ctx.lineTo(-p.size, p.size);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        p.y += p.speed;
        p.x += Math.sin(t + p.drift) * 0.8;
        p.angle += p.spin;

        if (p.y > canvas.height + 20) {
          p.y = -20;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
