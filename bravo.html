<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bravo !</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
      min-height: 100vh;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .badge {
      font-size: 4rem;
      animation: pop 0.6s ease;
      display: inline-block;
      margin-bottom: 10px;
    }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 2.2rem;
      color: #f0c040;
      margin-bottom: 20px;
      animation: fadeUp 0.7s ease 0.2s both;
    }

    .message {
      max-width: 560px;
      margin: 0 auto 36px;
      font-size: 1.05rem;
      line-height: 1.9;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 28px;
      animation: fadeUp 0.7s ease 0.4s both;
    }

    .message strong { color: #f0c040; }

    .photos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeUp 0.7s ease 0.6s both;
    }

    .photos img {
      width: 240px;
      height: 320px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .photos img:hover { transform: scale(1.04); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
  </style>
</head>
<body>

  <canvas id="confetti"></canvas>

  <div class="badge">🎉</div>
  <h1>Bien joué !</h1>

  <div class="message">
    Tu as trouvé le résultat du mot fléché…<br/><br/>
    <strong>En regroupant les deux énigmes, est-ce qu'une petite idée se profile ?</strong><br/><br/>
    Si non, un peu de patience —<br/>on vous dévoile tout ça <strong>début juillet !</strong> 🗓️
  </div>

  <div class="photos">
    <img src="photo1.jpg" alt="Photo 1" />
    <img src="photo2.jpg" alt="Photo 2" />
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const colors = ['#f0c040','#ff6b6b','#6bcfff','#a0ff80','#ff9ff3'];
    const pieces = Array.from({length: 90}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 7 + 4,
      tilt: Math.random() * 10 - 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 2 + 1
    }));

    let angle = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      angle += 0.01;
      pieces.forEach(p => {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.ellipse(p.x, p.y, p.r, p.r / 2, p.tilt, 0, 2 * Math.PI);
        ctx.fill();
        p.y += p.speed;
        p.x += Math.sin(angle) * 0.9;
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
