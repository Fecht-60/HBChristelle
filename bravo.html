<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bien joué !</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0ece4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    body.visible { opacity: 1; }

    .wrapper {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .tag {
      display: inline-block;
      background: #c8b89a;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #5a4f45;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .message {
      font-size: 15px;
      color: #7a6f63;
      line-height: 1.85;
      margin-bottom: 36px;
      padding: 24px 28px;
      background: #fffdf8;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.05);
      text-align: left;
    }

    .message strong { color: #5a4f45; font-weight: 600; }

    .photos {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .photos img {
      width: calc(50% - 8px);
      max-width: 210px;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }

    .photos img:hover { transform: translateY(-4px); }

    @media (max-width: 440px) {
      h1 { font-size: 1.6rem; }
      .message { padding: 20px; font-size: 14px; }
      .photos { gap: 12px; }
      .photos img { border-radius: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="tag">Énigme résolue</div>
    <h1>Bien joué&nbsp;!</h1>

    <div class="message">
      Tu as trouvé le résultat du mot fléché…<br/><br/>
      <strong>En regroupant les deux énigmes, est-ce qu'une petite idée se profile&nbsp;?</strong><br/><br/>
      Si non, un peu de patience —<br/>on vous dévoile tout ça <strong>début juillet&nbsp;!</strong> 🗓️
    </div>

    <div class="photos">
      <img src="photo1.jpg" alt=""/>
      <img src="photo2.jpg" alt=""/>
    </div>
  </div>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    (async () => {
      const token = sessionStorage.getItem('access_token');
      const storedHash = sessionStorage.getItem('token_hash');
      if (!token || !storedHash || await sha256(token) !== storedHash) {
        window.location.replace('index.html');
        return;
      }
      sessionStorage.removeItem('access_token');
      sessionStorage.removeItem('token_hash');
      document.body.classList.add('visible');
    })();
  </script>
</body>
</html>
