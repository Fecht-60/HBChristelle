<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Énigme</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #d6e4f0 0%, #dce8f5 50%, #cfe0f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a3a5c;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.55);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.8);
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(100,130,180,0.15);
    }

    .icon { font-size: 3rem; margin-bottom: 16px; }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #b07d3a;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #6a7a9a;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .crossword-link {
      display: inline-block;
      background: linear-gradient(135deg, #e8c97a, #c9943a);
      color: #fff;
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      margin-bottom: 36px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,160,60,0.3);
    }

    .crossword-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,160,60,0.45);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(100,130,180,0.2);
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: #6a7a9a;
      margin-bottom: 12px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid rgba(100,130,180,0.25);
      background: rgba(255,255,255,0.7);
      color: #3a3a5c;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 16px;
    }

    input[type="text"]::placeholder { letter-spacing: 2px; color: #b0bcd0; }
    input[type="text"]:focus { border-color: #c9943a; }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e8c97a, #c9943a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,160,60,0.25);
      -webkit-tap-highlight-color: transparent;
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,160,60,0.4); }
    button:active { transform: scale(0.99); }

    .error {
      margin-top: 14px;
      color: #d07070;
      font-size: 0.9rem;
      display: none;
    }

    @media (max-width: 440px) {
      .container { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🧩</div>
    <h1>Christelle</h1>
    <p class="subtitle">Commence par résoudre le mot fléché,<br>Tu obtiendras un code à entrer ci-dessous.</p>

    <a class="crossword-link" href="https://puzzel.org/fr/crossword/play?p=-OotlW72zDFxkJ2zk49G" target="_blank">
      🔗 Accéder au mot fléché
    </a>

    <hr class="divider"/>

    <label for="code">Entre le code secret issu du mot fléché :</label>
    <input type="text" id="code" placeholder="••••••" maxlength="12"
           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
    <button onclick="verifier()">Valider →</button>
    <p class="error" id="erreur">❌ Code incorrect, réessaie !</p>
  </div>

  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    const H = '1079a835fb3351be59143397f999e1fb98916d93ca0f133d082dd607b4ba5ef8';

    async function verifier() {
      const val = document.getElementById('code').value.trim().toUpperCase();
      const input = document.getElementById('code');
      const erreur = document.getElementById('erreur');
      const hash = await sha256(val);
      if (hash === H) {
        const token = crypto.randomUUID();
        sessionStorage.setItem('access_token', token);
        sessionStorage.setItem('token_hash', await sha256(token));
        window.location.href = atob('YnJhdm8uaHRtbA==');
      } else {
        input.style.borderColor = '#d07070';
        erreur.style.display = 'block';
        setTimeout(() => {
          input.style.borderColor = '';
          erreur.style.display = 'none';
        }, 2500);
      }
    }

    document.getElementById('code').addEventListener('keypress', e => {
      if (e.key === 'Enter') verifier();
    });
  </script>
</body>
</html>
